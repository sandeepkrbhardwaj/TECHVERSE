<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home</title>

  <style>
    /* =============== BASIC RESET =============== */
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial;
    }

    body{
      background:#90b3cf;
      padding:40px;
    }

    /* =============== CAROUSEL WRAPPER =============== */
    .carousel{
      width:100%;
      max-width:1200px;
      margin:auto;
      position:relative;
    }

    .track{
      display:flex;
      overflow:hidden;   /* hides cards going out of view */
      width:100%;
    }

    .slide{
      min-width:100%;    /* each slide takes full width */
      transition:0.5s;   /* slide animation */
    }

    /* Card Style */
    .card{
      height:350px;
      background:#debaba;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 8px 30px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* =============== ARROW BUTTONS =============== */
    .arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:#fff;
      width:45px;
      height:45px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      cursor:pointer;
      box-shadow:0 4px 15px rgba(0,0,0,0.15);
      user-select:none;
    }

    .left{
      left:-20px;
    }

    .right{
      right:-20px;
    }

  </style>
</head>
<body>

  <!-- =============== CAROUSEL =============== -->
  <div class="carousel">

    <!-- SLIDE TRACK -->
    <div class="track" id="track">

      <!-- Slide 1 -->
      <div class="slide">
        <div class="card">
          <img src="discussion.png" alt="">
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="slide">
        <div class="card">
          <img src="dev8.jpg" alt="">
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="slide">
        <div class="card">
          <img src="dev1.jpg" alt="">
        </div>
      </div>

    </div>

    <!-- ARROWS -->
    <div class="arrow left" id="prev">&#8249;</div>
    <div class="arrow right" id="next">&#8250;</div>

  </div>

  <!-- =============== JAVASCRIPT =============== -->
  <script>
    // slide index
    let index = 0;

    // get track
    const track = document.getElementById("track");

    // get total slides
    const slides = document.querySelectorAll(".slide");
    const total = slides.length;

    // NEXT BUTTON
    document.getElementById("next").onclick = function() {
      index++;
      if(index >= total) index = 0;   // loop back to start
      updateSlide();
    }

    // PREV BUTTON
    document.getElementById("prev").onclick = function() {
      index--;
      if(index < 0) index = total - 1;  // go to last slide
      updateSlide();
    }

    // FUNCTION TO MOVE SLIDER
    function updateSlide(){
      track.style.transform = `translateX(-${index * 100}%)`;
    }
  </script>

</body>
</html>
