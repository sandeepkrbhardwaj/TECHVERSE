<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Active vs Passive Learning</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(to right, #a3bbd4, #bed7ee);
      padding:40px;
    }

    .container{
      display:flex;
      justify-content: center;
      gap:30px;
    }

    .box{
      width:300px;
      padding:20px;
      background:rgb(219, 229, 161);
      border-radius:20px;
      box-shadow:0 4px 20px rgba(0,0,0,0.1);
      text-align:center;
      transition:0.3s;
    }

    .box:hover{
      transform:translateY(-8px);
      box-shadow:0 6px 25px rgba(0,0,0,0.2);
    }

    .title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:15px;
      color:#333;
    }

    .text{
      font-size:16px;
      color:#555;
      line-height:1.4;
    }

  </style>
</head>
<body>

  <h1 style="text-align:center; margin-bottom:40px;">Active vs Passive Learning</h1>

  <div class="container">

    <div class="box">
      <div class="title">Active Learning</div>
      <div class="text">
        - Students participate<br><br>
        - Ask questions<br><br>
        - Group activities<br><br>
        - Practical learning<br><br>
      </div>
    </div>

    <div class="box">
      <div class="title">Passive Learning</div>
      <div class="text">
        - Students listen only<br><br>
        - No interaction<br><br>
        - Teacher-centered<br><br>
        - Less engagement<br><br>
      </div>
    </div>

  </div>

</body>
</html>
