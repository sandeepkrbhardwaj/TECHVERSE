<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Techverse</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:Arial, sans-serif;background:#fff;color:#111;}

    /* NAVBAR */
    .navbar{
      position:fixed;top:0;left:0;right:0;height:64px;
      background:#071833;color:#fff;
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 24px;z-index:1000;
    }
    .nav-left{display:flex;gap:14px;align-items:center;}
    .logo{height:40px;width:auto;display:block;}
    .brand{color:#fff;text-decoration:none;font-size:22px;font-weight:700;}
    .nav-actions{display:flex;gap:12px;align-items:center;}
    .btn{
      background:#0b75da;border:none;padding:8px 14px;color:#fff;
      border-radius:8px;cursor:pointer;font-weight:600;
    }

    /* PAGE */
    main{padding-top:90px;}
    .container{max-width:1200px;margin:10px auto;padding:0 18px;}

    .hero{
      width:100%;height:430px;object-fit:cover;border-radius:10px;
      display:block;margin:0 auto 24px;
    }

    /* COURSES */
    .courses{
      display:flex;justify-content:center;gap:28px;flex-wrap:nowrap;
      overflow-x:auto;max-width:1200px;margin:30px auto 60px;padding:8px;
    }
    .course-box{min-width:240px;max-width:280px;text-align:center;}
    .course-box img{width:100%;border-radius:12px;object-fit:cover;display:block;}
    .course-box h2{margin-top:12px;font-size:20px;font-weight:700;color:#111;}

    /* MODAL */
    #popupModal{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
      justify-content:center;align-items:center;z-index:3000;
    }
    #popupModal.show{display:flex;}
    #popupDialog{
      width:95%;max-width:760px;background:#fff;border-radius:12px;
      max-height:90vh;overflow:hidden;position:relative;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }
    #popupClose{
      position:absolute;right:12px;top:8px;cursor:pointer;font-size:28px;border:none;background:none;
    }
    #popupBody{padding:18px;height:70vh;overflow:auto;}
    #popupBody iframe{width:100%;height:100%;border:none;border-radius:6px;}

    input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;}

    @media (max-width:600px){
      .hero{height:240px;}
      .courses{gap:12px;padding:6px;}
      .navbar{padding:8px 12px;}
    }
  </style>
</head>

<body>
  <!-- NAVBAR -->
  <nav class="navbar" role="navigation" aria-label="main navigation">
    <div class="nav-left">
      <img src="logo1.jpg" alt="Techverse logo" class="logo" onerror="this.style.display='none'">
      <a class="brand" href="#">Techverse</a>
    </div>

    <div class="nav-actions" aria-hidden="false">
      <button id="loginBtn" class="btn" aria-haspopup="dialog">Login</button>
      <button id="signupBtn" class="btn" aria-haspopup="dialog">Sign Up</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="container">
      <img src="home.png" alt="Hero banner" class="hero" onerror="this.style.display='none'">

      <div class="courses" role="list" aria-label="Popular courses">
        <div class="course-box" role="listitem">
          <img src="software-dev.png" alt="Software development" onerror="this.style.opacity=.4">
          <h2>Software Development</h2>
        </div>

        <div class="course-box" role="listitem">
          <img src="discussion.png" alt="Full stacks development" onerror="this.style.opacity=.4">
          <h2>Full Stacks DEV</h2>
        </div>

        <div class="course-box" role="listitem">
          <img src="web-dev.png" alt="Web development" onerror="this.style.opacity=.4">
          <h2>Web Development</h2>
        </div>

        <div class="course-box" role="listitem">
          <img src="ai-dev.png" alt="AI development" onerror="this.style.opacity=.4">
          <h2>AI Development</h2>
        </div>
      </div>
    </div>
  </main>

  <!-- POPUP -->
  <div id="popupModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div id="popupDialog">
      <button id="popupClose" aria-label="Close popup">&times;</button>
      <div id="popupBody"></div>
    </div>
  </div>

  <script>
    const modal = document.getElementById("popupModal");
    const popupBody = document.getElementById("popupBody");
    const closeBtn = document.getElementById("popupClose");

    function openModal(){ 
      modal.classList.add("show"); 
      modal.setAttribute("aria-hidden","false");
      document.body.style.overflow="hidden"; 
    }
    function closeModal(){ 
      modal.classList.remove("show"); 
      modal.setAttribute("aria-hidden","true");
      document.body.style.overflow=""; 
    }

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", e => { if(e.target===modal) closeModal(); });
    window.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

    // LOGIN POPUP
    document.getElementById("loginBtn").addEventListener("click", function(){
      popupBody.innerHTML = `
        <div style="padding:12px;">
          <h2 style="text-align:center;margin-bottom:10px;">Login</h2>
          <form onsubmit="event.preventDefault(); alert('Logged In!'); closeModal();">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button class="btn" style="width:100%;margin-top:10px;">Login</button>
          </form>
        </div>
      `;
      openModal();
    });

    // SIGNUP POPUP (iframe loads sign-up.html)
    document.getElementById("signupBtn").addEventListener("click", function(){
      /* sandbox: allow-forms and allow-scripts needed for the signup form to work.
         avoid allow-same-origin unless you specifically need parent/iframe access. */
      popupBody.innerHTML = `<iframe src="sign-up.html" title="Sign up form" sandbox="allow-forms allow-scripts"></iframe>`;
      openModal();
    });

    // expose closeModal for iframes that try to call parent.closeModal()
    window.closeModal = closeModal;
  </script>
</body>
</html>
