<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign up</title>
  <style>
    body{font-family:Arial;padding:20px;background:#625d5d;}
    .box{max-width:520px;margin:0 auto;background:#e9e7e7;padding:22px;border-radius:8px;}
    h2{text-align:center;margin-bottom:12px;}
    input{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
    .btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;background:#6b4bd6;color:#fff;font-weight:700;cursor:pointer;}
    .small{font-size:14px;color:#333;text-align:center;margin-top:10px;}
  </style>
</head>
<body>
  <div class="box">
    <img src="logo1.jpg" alt="logo" style="display:block;margin:0 auto 12px auto;height:110px;">
    <h2>Create account</h2>

    <form id="signupForm">
      <input type="text" name="name" placeholder="Full name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="btn">Sign up</button>
    </form>

    <p class="small">Already have an account? <button id="toLogin" style="background:none;border:none;color:#6b4bd6;cursor:pointer;text-decoration:underline;">Sign in</button></p>
  </div>

  <script>
    (function(){
      const form = document.getElementById('signupForm');
      const toLogin = document.getElementById('toLogin');

      // prevent default full-frame redirect inside iframe
      form.addEventListener('submit', function(e){
        e.preventDefault();
        const email = form.email.value;

        // close parent modal
        try {
          if (window.parent && typeof window.parent.closeModal === 'function') {
            window.parent.closeModal();
          }
        } catch(err) {
          console.warn('Could not call parent.closeModal()', err);
        }

        // UPDATED → navigate to login-page.html
        try {
          if (window.parent) {
            window.parent.location.href = 'login-page.html';
          } else {
            window.location.href = 'login-page.html';
          }
        } catch(err) {
          window.location.href = 'login-page.html';
        }
      });

      // switch to login inside parent modal
      toLogin.addEventListener('click', function(){
        try {
          const loginBtn = window.parent.document.getElementById('loginBtn');
          if (loginBtn) loginBtn.click();
        } catch(err){
          console.warn('Could not switch to login in parent', err);
        }
      });
    })();
  </script>
</body>
</html>
